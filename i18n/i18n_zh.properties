# POD Notification Handler Widget - Chinese Simplified
# Widget
widget.title=POD 通知处理程序
widget.noEventNames=未配置事件名称。请在插件属性中输入事件名称。
widget.listening=正在监听事件：{0}
widget.lastReceived=最近收到：[{0}] 值：{1}
widget.noMessages=尚未收到任何通知。
